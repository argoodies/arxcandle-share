    <script type="text/javascript">
        var I18N = {
            "zh-Hans": {
                title: "AR祈福开源和第三方许可",
                h1: "开源和第三方许可",
                free3d: "Free3d.com 个人使用许可"
            },
            "zh-Hant": {
                title: "AR祈福開源與第三方授權",
                h1: "開源與第三方授權",
                free3d: "Free3d.com 個人使用授權"
            },
            "en": {
                title: "ARCandle Open Source & Licenses",
                h1: "Open Source & Licenses",
                free3d: "Free3d.com Personal-Use License"
            },
            "ja": {
                title: "AR祈福 オープンソースとライセンス",
                h1: "オープンソースとライセンス",
                free3d: "Free3d.com 個人利用ライセンス"
            }
        };

        function resolveLang() {
            var p = (new URLSearchParams(location.search)).get('lang');
            var l = (p || navigator.language || 'zh-Hans').toLowerCase();
            if (l.indexOf('hant') >= 0 || l.indexOf('-tw') >= 0 || l.indexOf('-hk') >= 0 || l.indexOf('-mo') >= 0) return 'zh-Hant';
            if (l.indexOf('zh') === 0) return 'zh-Hans';
            if (l.indexOf('ja') === 0) return 'ja';
            if (l.indexOf('en') === 0) return 'en';
            return 'zh-Hans';
        }

        (function applyI18n() {
            var lang = resolveLang();
            var dict = I18N[lang] || I18N['zh-Hans'];
            document.documentElement.setAttribute('lang', lang);
            if (dict.title) document.title = dict.title;
            var nodes = document.querySelectorAll('[data-i18n]');
            for (var i = 0; i < nodes.length; i++) {
                var key = nodes[i].getAttribute('data-i18n');
                if (dict[key] != null) nodes[i].textContent = dict[key];
            }
        })();
    </script>
